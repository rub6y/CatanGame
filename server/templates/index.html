<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatanPro - User Connection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>CatanPro</h1>
        
        <div id="join-screen">
            <div class="role-selection">
                <label>
                    <input type="radio" name="role" value="player" id="role-player">
                    Player
                </label>
                <label>
                    <input type="radio" name="role" value="observer" id="role-observer" checked>
                    Observer
                </label>
            </div>
            <input type="text" id="username" placeholder="Enter your name" />
            <button id="join-btn">Join</button>
        </div>

        <div id="user-screen" class="hidden">
            <div class="user-lists">
                <div class="player-list">
                    <h2>Players (<span id="player-count">0</span>/4)</h2>
                    <ul id="players"></ul>
                </div>
                <div class="observer-list">
                    <h2>Observers</h2>
                    <ul id="observers"></ul>
                </div>
            </div>
            <button id="start-game-btn" class="hidden">Start Game</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/client.js') }}"></script>
</body>
</html>
