<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catan - User Connection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1 id="game-title">Catan</h1>
        
        <div id="join-screen">
            <div class="role-selection">
                <label>
                    <input type="radio" name="role" value="player" id="role-player">
                    Player
                </label>
                <label>
                    <input type="radio" name="role" value="observer" id="role-observer" checked>
                    Observer
                </label>
            </div>
            <input type="text" id="username" placeholder="Enter your name" />
            <div class="color-selection">
                <label for="join-color-picker">Choose your color:</label>
                <input type="color" id="join-color-picker" value="#3498db">
            </div>
            <button id="join-btn">Join</button>
        </div>

        <div id="user-screen" class="hidden">
            <div class="user-lists">
                <div class="player-list">
                    <h2>Players (<span id="player-count">0</span>/4)</h2>
                    <ul id="players"></ul>
                </div>
                <div class="observer-list">
                    <h2>Observers</h2>
                    <ul id="observers"></ul>
                </div>
            </div>
            <button id="start-game-btn" class="hidden">Start Game</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="game-sidebar">
                <div class="player-list">
                    <h2>Players</h2>
                    <ul id="game-players"></ul>
                </div>
                <div class="observer-list">
                    <h2>Observers</h2>
                    <ul id="game-observers"></ul>
                </div>
            </div>
            <div class="game-main">
                <div class="game-board" id="game-board">
                    <canvas id="board-canvas"></canvas>
                </div>
                <div class="game-console" id="game-console">
                    <div id="setup-indicator" class="hidden">
                        <span id="setup-player-name"></span>
                        <span id="setup-action-text"></span>
                    </div>
                    <div class="dice-container">
                        <button id="roll-dice-btn">Roll Dice</button>
                        <div id="dice-display" class="dice-display"></div>
                    </div>
                    <input type="color" id="color-picker" title="Choose your color">
                    <button id="place-settlement-btn">Settlement</button>
                    <button id="place-road-btn">Road</button>
                    <button id="next-turn-btn">Next Turn</button>
                </div>
            </div>
            <div class="resource-sidebar">
                <div id="trade-panel">
                    <h2>Trade</h2>
                    <button id="propose-trade-btn">Propose Trade</button>
                    <div id="trade-offers" class="trade-offers"></div>
                    <div id="my-offers" class="my-offers"></div>
                </div>
                <div id="info-panel">
                    <div id="player-resources-panel">
                        <h2>Your Resources</h2>
                        <div id="resource-display" class="resource-display"></div>
                    </div>
                    <div id="bank-panel">
                        <h2>Bank</h2>
                        <div id="bank-display" class="bank-display"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Trade Modal -->
    <div id="trade-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-trade-modal" class="close">&times;</span>
            <h2>Propose Trade</h2>
            <div class="trade-modal-section">
                <h3>You Give:</h3>
                <div class="resource-selector">
                    <label>🌲 Wood: <input type="number" id="give-wood" min="0" max="10" value="0"></label>
                    <label>🧱 Brick: <input type="number" id="give-brick" min="0" max="10" value="0"></label>
                    <label>🐑 Sheep: <input type="number" id="give-sheep" min="0" max="10" value="0"></label>
                    <label>🌾 Wheat: <input type="number" id="give-wheat" min="0" max="10" value="0"></label>
                    <label>🪨 Ore: <input type="number" id="give-ore" min="0" max="10" value="0"></label>
                </div>
            </div>
            <div class="trade-modal-section">
                <h3>You Want:</h3>
                <div class="resource-selector">
                    <label>🌲 Wood: <input type="number" id="want-wood" min="0" max="10" value="0"></label>
                    <label>🧱 Brick: <input type="number" id="want-brick" min="0" max="10" value="0"></label>
                    <label>🐑 Sheep: <input type="number" id="want-sheep" min="0" max="10" value="0"></label>
                    <label>🌾 Wheat: <input type="number" id="want-wheat" min="0" max="10" value="0"></label>
                    <label>🪨 Ore: <input type="number" id="want-ore" min="0" max="10" value="0"></label>
                </div>
            </div>
            <button id="submit-trade-btn">Propose</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/board-renderer.js') }}"></script>
    <script src="{{ url_for('static', filename='js/client.js') }}"></script>
</body>
</html>
